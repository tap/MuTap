name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            werror: ON
          - name: Linux Clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            werror: ON
          # Warnings stay non-fatal on MSVC until /W4 output has been triaged
          # on a Windows runner (same policy as the sibling *Tap repos).
          - name: macOS AppleClang
            os: macos-latest
            werror: ON
          - name: Windows MSVC
            os: windows-latest
            werror: OFF
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DMUTAP_WERROR=${{ matrix.werror }}

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"

      - name: Build
        run: cmake --build build -j 4

      - name: Test
        env:
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build --output-on-failure

  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # Pinned major version: formatting output can differ across releases.
      - name: Check formatting
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q clang-format-18
          clang-format-18 --dry-run --Werror \
            include/mutap/*.h tests/*.cpp tests/support/*.h
